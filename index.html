<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Dates</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0b14;
  --surface: #13101e;
  --surface2: #1a1628;
  --surface3: #221e35;
  --border: #2e2848;
  --accent: #c084fc;
  --accent2: #f472b6;
  --accent3: #67e8f9;
  --gold: #fbbf24;
  --green: #4ade80;
  --red: #f87171;
  --text: #e2d9f3;
  --text2: #9d8fc0;
  --text3: #6b5f8a;
  --radius: 14px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Starfield */
#stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation: twinkle var(--d, 3s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
  opacity: 0;
}
@keyframes twinkle {
  0%, 100% { opacity: 0; transform: scale(0.8); }
  50% { opacity: var(--op, 0.7); transform: scale(1); }
}

/* Layout */
#app {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Header */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  background: rgba(13,11,20,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-style: italic;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 0.5px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.streak-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(251,191,36,0.12);
  border: 1px solid rgba(251,191,36,0.3);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 13px;
  color: var(--gold);
  font-weight: 500;
}

.points-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(192,132,252,0.12);
  border: 1px solid rgba(192,132,252,0.3);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 13px;
  color: var(--accent);
  font-weight: 600;
}

/* Nav */
nav {
  display: flex;
  gap: 4px;
  padding: 10px 24px;
  background: rgba(13,11,20,0.6);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}

nav::-webkit-scrollbar { display: none; }

.nav-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-family: 'Outfit', sans-serif;
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  position: relative;
}

.nav-btn .notif {
  position: absolute;
  top: 4px; right: 8px;
  width: 7px; height: 7px;
  background: var(--accent2);
  border-radius: 50%;
  border: 1.5px solid var(--bg);
}

.nav-btn:hover { color: var(--text); background: var(--surface2); }

.nav-btn.active {
  color: var(--accent);
  background: rgba(192,132,252,0.1);
}

/* Content */
#content {
  flex: 1;
  padding: 24px;
  max-width: 1100px;
  margin: 0 auto;
  width: 100%;
}

/* Section titles */
.section-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 20px;
}

/* Cards grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 16px;
}

/* Girl card */
.girl-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
}

.girl-card:hover {
  border-color: var(--accent);
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(192,132,252,0.15);
}

.girl-card .girl-img {
  width: 100%;
  aspect-ratio: 3/4;
  object-fit: cover;
  display: block;
}

.girl-card .girl-img-placeholder {
  width: 100%;
  aspect-ratio: 3/4;
  background: linear-gradient(135deg, var(--surface2), var(--surface3));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
}

.girl-card .girl-info {
  padding: 12px;
}

.girl-card .girl-name {
  font-weight: 600;
  font-size: 15px;
  margin-bottom: 4px;
}

.girl-card .girl-desc {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 10px;
  line-height: 1.4;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 10px;
}

.tag {
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  border: 1px solid;
}

.tag-purple { color: var(--accent); border-color: rgba(192,132,252,0.3); background: rgba(192,132,252,0.1); }
.tag-pink { color: var(--accent2); border-color: rgba(244,114,182,0.3); background: rgba(244,114,182,0.1); }
.tag-cyan { color: var(--accent3); border-color: rgba(103,232,249,0.3); background: rgba(103,232,249,0.1); }
.tag-gold { color: var(--gold); border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.1); }

.love-bar-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text2);
}

.love-bar {
  flex: 1;
  height: 4px;
  background: var(--surface3);
  border-radius: 2px;
  overflow: hidden;
}

.love-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 2px;
  transition: width 0.5s ease;
}

.girl-card .status-badge {
  position: absolute;
  top: 10px; right: 10px;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.badge-unknown { background: rgba(107,95,138,0.7); color: #c4b8e0; }
.badge-warming { background: rgba(244,114,182,0.2); border: 1px solid rgba(244,114,182,0.4); color: var(--accent2); }
.badge-hot { background: rgba(192,132,252,0.2); border: 1px solid rgba(192,132,252,0.4); color: var(--accent); }
.badge-cold { background: rgba(103,232,249,0.1); border: 1px solid rgba(103,232,249,0.3); color: var(--accent3); }
.badge-max { background: rgba(251,191,36,0.2); border: 1px solid rgba(251,191,36,0.4); color: var(--gold); }

/* Add card */
.add-card {
  background: transparent;
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 260px;
  color: var(--text3);
  font-size: 13px;
}

.add-card:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(192,132,252,0.05);
}

.add-card .plus {
  font-size: 28px;
  line-height: 1;
}

/* Tasks */
.tasks-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.btn {
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  border: none;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
}

.btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }

.btn-ghost {
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border);
}

.btn-ghost:hover { color: var(--text); border-color: var(--accent); }

.btn-sm {
  padding: 5px 12px;
  font-size: 12px;
  border-radius: 6px;
}

.btn-danger {
  background: rgba(248,113,113,0.15);
  color: var(--red);
  border: 1px solid rgba(248,113,113,0.3);
}

.btn-danger:hover { background: rgba(248,113,113,0.25); }

.btn-success {
  background: rgba(74,222,128,0.15);
  color: var(--green);
  border: 1px solid rgba(74,222,128,0.3);
}

.btn-success:hover { background: rgba(74,222,128,0.25); }

/* Task card */
.task-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 10px;
  transition: all 0.2s;
}

.task-card:hover { border-color: var(--surface3); }

.task-card.completed {
  opacity: 0.55;
  border-color: rgba(74,222,128,0.2);
}

.task-card.overdue {
  border-color: rgba(248,113,113,0.3);
  background: rgba(248,113,113,0.04);
}

.task-check {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid var(--border);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}

.task-check:hover { border-color: var(--green); }
.task-check.done { background: var(--green); border-color: var(--green); }

.task-info { flex: 1; min-width: 0; }

.task-name {
  font-weight: 500;
  font-size: 14px;
  margin-bottom: 3px;
}

.task-card.completed .task-name {
  text-decoration: line-through;
}

.task-meta {
  display: flex;
  gap: 10px;
  font-size: 12px;
  color: var(--text3);
  flex-wrap: wrap;
}

.task-deadline {
  color: var(--text2);
}

.task-deadline.soon { color: var(--gold); }
.task-deadline.overdue { color: var(--red); }

.task-points {
  display: flex;
  align-items: center;
  gap: 4px;
  font-weight: 700;
  font-size: 14px;
  color: var(--accent);
}

.cat-badge {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  background: var(--surface3);
  color: var(--text2);
}

/* Dates section */
.dates-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}

.activity-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}

.activity-card::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.3s;
}

.activity-card:hover { transform: translateY(-3px); }
.activity-card:hover::before { opacity: 1; }

.activity-card.cafe::before { background: linear-gradient(135deg, rgba(251,191,36,0.06), transparent); }
.activity-card.dinner::before { background: linear-gradient(135deg, rgba(244,114,182,0.08), transparent); }
.activity-card.walk::before { background: linear-gradient(135deg, rgba(74,222,128,0.06), transparent); }
.activity-card.movie::before { background: linear-gradient(135deg, rgba(103,232,249,0.06), transparent); }
.activity-card.trip::before { background: linear-gradient(135deg, rgba(192,132,252,0.1), transparent); }
.activity-card.concert::before { background: linear-gradient(135deg, rgba(251,191,36,0.08), transparent); }

.activity-card:hover { border-color: var(--accent); }

.activity-icon { font-size: 30px; margin-bottom: 12px; }

.activity-name {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 6px;
}

.activity-desc {
  font-size: 12.5px;
  color: var(--text2);
  margin-bottom: 12px;
  line-height: 1.5;
}

.activity-cost {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.cost-tag {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  background: rgba(192,132,252,0.1);
  padding: 4px 10px;
  border-radius: 6px;
}

.difficulty-dots {
  display: flex;
  gap: 3px;
}

.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--surface3);
}

.dot.active { background: var(--accent2); }

/* Modals */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 28px;
  width: 100%;
  max-width: 480px;
  max-height: 85vh;
  overflow-y: auto;
  animation: slideUp 0.25s ease;
  position: relative;
}

.modal.wide { max-width: 600px; }

@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  margin-bottom: 6px;
}

.modal-sub {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 24px;
}

.close-btn {
  position: absolute;
  top: 18px; right: 18px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  width: 32px; height: 32px;
  cursor: pointer;
  color: var(--text2);
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}

.close-btn:hover { color: var(--text); border-color: var(--accent); }

/* Form */
.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 6px;
}

.form-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.form-input:focus { border-color: var(--accent); }

.form-input::placeholder { color: var(--text3); }

textarea.form-input { resize: vertical; min-height: 80px; }

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.points-slider-wrap {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
}

.points-slider-top {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 13px;
  color: var(--text2);
}

.points-val {
  font-weight: 700;
  font-size: 18px;
  color: var(--accent);
}

input[type=range] {
  width: 100%;
  accent-color: var(--accent);
  cursor: pointer;
}

.tag-input-wrap {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px;
  min-height: 44px;
  align-items: center;
  cursor: text;
}

.tag-input-field {
  background: none;
  border: none;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  outline: none;
  flex: 1;
  min-width: 80px;
}

.removable-tag {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  background: rgba(192,132,252,0.15);
  color: var(--accent);
  border: 1px solid rgba(192,132,252,0.3);
}

.removable-tag span { cursor: pointer; font-size: 13px; line-height: 1; }

/* Chat */
.chat-wrap {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  height: 360px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg {
  display: flex;
  gap: 8px;
  max-width: 85%;
}

.msg.user { align-self: flex-end; flex-direction: row-reverse; }

.msg-bubble {
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 13.5px;
  line-height: 1.5;
}

.msg.her .msg-bubble {
  background: var(--surface3);
  color: var(--text);
  border-bottom-left-radius: 4px;
}

.msg.user .msg-bubble {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  border-bottom-right-radius: 4px;
}

.msg-time {
  font-size: 10px;
  color: var(--text3);
  align-self: flex-end;
  white-space: nowrap;
}

.chat-input-bar {
  display: flex;
  gap: 8px;
  padding: 12px;
  border-top: 1px solid var(--border);
}

.chat-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 8px 16px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}

.chat-input:focus { border-color: var(--accent); }

.chat-send {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
  flex-shrink: 0;
}

.chat-send:hover { opacity: 0.85; transform: scale(1.05); }
.chat-send:disabled { opacity: 0.4; cursor: not-allowed; }

.typing-indicator {
  display: flex;
  gap: 4px;
  align-items: center;
  padding: 10px 14px;
  background: var(--surface3);
  border-radius: 14px;
  border-bottom-left-radius: 4px;
  width: fit-content;
}

.typing-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--text3);
  animation: bounce 1.2s ease-in-out infinite;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
  40% { transform: translateY(-6px); opacity: 1; }
}

/* Notifications */
.notif-bar {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 24px;
}

.notif-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.2s;
  animation: slideRight 0.3s ease;
}

@keyframes slideRight { from { transform: translateX(-10px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.notif-item:hover { border-color: var(--accent); }
.notif-item.birthday { border-color: rgba(251,191,36,0.4); background: rgba(251,191,36,0.04); }
.notif-item.invite { border-color: rgba(244,114,182,0.3); background: rgba(244,114,182,0.04); }

.notif-icon { font-size: 22px; flex-shrink: 0; }

.notif-text { flex: 1; }
.notif-title { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
.notif-desc { font-size: 12px; color: var(--text2); }
.notif-dismiss { color: var(--text3); font-size: 18px; cursor: pointer; padding: 4px; }
.notif-dismiss:hover { color: var(--text); }

/* Date scene */
.scene-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  min-height: 120px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
}

.scene-loading {

<script>
const GROQ_KEY = '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';
const GROQ_URL = 'https://api.groq.com/openai/v1/chat/completions';

// ---- State ----
let state = JSON.parse(localStorage.getItem('idealDatesState') || 'null') || {
  points: 150,
  streak: 0,
  lastTaskDate: null,
  tasks: [],
  girls: [
    {
      id: 'g1',
      name: 'C.C.',
      desc: 'Enigmática y directa. No muestra sus emociones fácilmente, pero cuando lo hace, es especial.',
      tags: ['Inteligente', 'Misteriosa', 'Sarcástica'],
      tagColors: ['purple', 'cyan', 'pink'],
      emoji: '🌿',
      love: 40,
      status: 'warming',
      chatHistory: [],
      datesCount: 0,
      birthday: null,
    }
  ],
  notifications: [],
  nextGirlId: 2,
  nextTaskId: 1,
};

function save() {
  localStorage.setItem('idealDatesState', JSON.stringify(state));
}

function getStatus(love) {
  if (love <= 0) return 'cold';
  if (love >= 100) return 'max';
  if (love >= 70) return 'hot';
  if (love >= 30) return 'warming';
  return 'cold';
}

function statusLabel(s) {
  return { cold: 'Fría ❄️', warming: 'Calentando 🌸', hot: 'Enamorada 💜', max: '¡Perfecta! ✨', unknown: 'Desconocida' }[s] || s;
}

// ---- Stars ----
(function() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2 + 1;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*5}s;--op:${0.3+Math.random()*0.6}`;
    c.appendChild(s);
  }
})();

// ---- UI Helpers ----
function showSection(id) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + id).classList.add('active');
  const c = document.getElementById('content');
  if (id === 'tareas') renderTareas(c);
  else if (id === 'chicas') renderChicas(c);
  else if (id === 'citas') renderCitas(c);
  else if (id === 'chat') renderChat(c);
  updateHeader();
  checkNotifications();
}

function updateHeader() {
  document.getElementById('pointsCount').textContent = state.points;
  document.getElementById('streakCount').textContent = state.streak;
}

function toast(msg, type = 'info', icon = '✦') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${icon}</span> ${msg}`;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function openOverlay(html, onOpen) {
  const el = document.createElement('div');
  el.className = 'overlay';
  el.id = 'modalOverlay';
  el.innerHTML = html;
  el.addEventListener('click', e => { if (e.target === el) closeOverlay(); });
  document.getElementById('overlayContainer').appendChild(el);
  if (onOpen) onOpen(el);
}

function closeOverlay() {
  const el = document.getElementById('modalOverlay');
  if (el) el.remove();
}

// ---- Notifications ----
function checkNotifications() {
  // Random events: birthday, invite from girl
  const notifications = [...state.notifications];
  // Clear seen ones
  state.notifications = notifications.filter(n => !n.seen);
}

function generateRandomEvent() {
  if (state.girls.length === 0) return;
  const girl = state.girls[Math.floor(Math.random() * state.girls.length)];
  const events = [
    { type: 'invite', icon: '💌', title: `${girl.name} te invita a salir`, desc: 'Quiere ir a tomar un café esta tarde. ¿Aceptas?', girl: girl.id },
    { type: 'birthday', icon: '🎂', title: `¡Hoy es el cumpleaños de ${girl.name}!`, desc: 'No te olvides de celebrarlo con ella.', girl: girl.id },
    { type: 'message', icon: '💬', title: `${girl.name} te ha escrito`, desc: '¿Vas a dejarla sin respuesta?', girl: girl.id },
  ];
  const ev = events[Math.floor(Math.random() * events.length)];
  ev.id = Date.now();
  state.notifications.push(ev);
  save();
}

// ---- Tasks ----
function renderTareas(c) {
  const today = new Date().toDateString();
  const pending = state.tasks.filter(t => !t.completed);
  const done = state.tasks.filter(t => t.completed);

  // Check streak
  const notifs = state.notifications.length > 0 ? `
    <div class="notif-bar">
      ${state.notifications.slice(0,3).map(n => `
        <div class="notif-item ${n.type}" onclick="handleNotif('${n.id}')">
          <div class="notif-icon">${n.icon}</div>
          <div class="notif-text">
            <div class="notif-title">${n.title}</div>
            <div class="notif-desc">${n.desc}</div>
          </div>
          <div class="notif-dismiss" onclick="dismissNotif(event,'${n.id}')">×</div>
        </div>
      `).join('')}
    </div>
  ` : '';

  c.innerHTML = `
    ${notifs}
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-val">${state.points}</div>
        <div class="stat-lbl">Puntos PI</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">🔥${state.streak}</div>
        <div class="stat-lbl">Racha días</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">${pending.length}</div>
        <div class="stat-lbl">Pendientes</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">${done.length}</div>
        <div class="stat-lbl">Completadas</div>
      </div>
    </div>

    <div class="tasks-header">
      <div class="section-title">Mis Tareas</div>
      <button class="btn btn-primary" onclick="openNewTask()">+ Nueva tarea</button>
    </div>

    <div id="taskList">
      ${state.tasks.length === 0 ? `
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <p>No hay tareas. ¡Añade una para empezar a ganar puntos!</p>
        </div>
      ` : ''}
      ${pending.map(t => renderTaskCard(t)).join('')}
      ${done.length > 0 ? `
        <div class="section-title" style="margin-top:20px;margin-bottom:12px">Completadas</div>
        ${done.slice(0,5).map(t => renderTaskCard(t)).join('')}
      ` : ''}
    </div>
  `;
}

function renderTaskCard(t) {
  const now = new Date();
  const deadline = t.deadline ? new Date(t.deadline) : null;
  let deadlineClass = '';
  let deadlineStr = '';
  if (deadline && !t.completed) {
    const diff = deadline - now;
    if (diff < 0) { deadlineClass = 'overdue'; deadlineStr = '⚠ Vencida'; }
    else if (diff < 86400000) { deadlineClass = 'soon'; deadlineStr = '⏰ Hoy'; }
    else deadlineStr = '📅 ' + deadline.toLocaleDateString('es-ES', {day:'numeric',month:'short'});
  }

  return `
    <div class="task-card ${t.completed ? 'completed' : ''} ${deadlineClass === 'overdue' && !t.completed ? 'overdue' : ''}">
      <div class="task-check ${t.completed ? 'done' : ''}" onclick="toggleTask('${t.id}')">
        ${t.completed ? '✓' : ''}
      </div>
      <div class="task-info">
        <div class="task-name">${t.name}</div>
        <div class="task-meta">
          <span class="cat-badge">${t.category}</span>
          ${deadlineStr ? `<span class="task-deadline ${deadlineClass}">${deadlineStr}</span>` : ''}
        </div>
      </div>
      <div class="task-points">✦ ${t.points}</div>
      ${!t.completed ? `<button class="btn btn-sm btn-danger" onclick="deleteTask('${t.id}')">×</button>` : ''}
    </div>
  `;
}

function toggleTask(id) {
  const t = state.tasks.find(t => t.id === id);
  if (!t || t.completed) return;
  const now = new Date();
  const deadline = t.deadline ? new Date(t.deadline) : null;
  let earned = t.points;
  if (deadline && now > deadline) {
    const overMin = (now - deadline) / 60000;
    earned = overMin > 1440 ? 0 : Math.floor(t.points / 2);
  }
  t.completed = true;
  t.completedAt = now.toISOString();
  state.points += earned;

  // Streak
  const todayStr = now.toDateString();
  if (state.lastTaskDate !== todayStr) {
    const yesterday = new Date(now - 86400000).toDateString();
    state.streak = state.lastTaskDate === yesterday ? state.streak + 1 : 1;
    state.lastTaskDate = todayStr;
  }

  save();
  updateHeader();
  if (earned > 0) toast(`+${earned} PI ganados 🎉`, 'success', '✦');
  else toast('Completada tarde, 0 PI', 'error', '⚠');
  showSection('tareas');
}

function deleteTask(id) {
  state.tasks = state.tasks.filter(t => t.id !== id);
  save();
  showSection('tareas');
}

  const cats = ['Personal', 'Trabajo', 'Salud', 'Estudios', 'Hogar', 'Otro'];

        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
        <button class="btn btn-ghost" onclick="closeOverlay()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveTask()">Guardar</button>
      </div>
    </div>
  `);
}

function saveTask() {
  const name = document.getElementById('tName').value.trim();
  if (!name) { toast('Escribe un nombre', 'error', '⚠'); return; }
  state.tasks.unshift({
    id: 't' + (state.nextTaskId++),
    name,
    category: document.getElementById('tCat').value,
    deadline: document.getElementById('tDeadline').value || null,
    points: parseInt(document.getElementById('tPoints').value),
    completed: false,
    createdAt: new Date().toISOString(),
  });

  closeOverlay();
  toast('Tarea creada ✓', 'success', '📋');
  showSection('tareas');
}

function handleNotif(id) {
  const n = state.notifications.find(x => x.id == id);
  if (!n) return;
  if (n.type === 'invite' || n.type === 'message') {
    dismissNotif(null, id);
    showSection('chat');
  } else {
    dismissNotif(null, id);
  }
}

function dismissNotif(e, id) {
  if (e) e.stopPropagation();
  state.notifications = state.notifications.filter(n => n.id != id);
  save();
  showSection('tareas');
}

      </div>

  `, (el) => {

      if ((e.key === 'Enter' || e.key === ',') && field.value.trim()) {

          const span = document.createElement('span');
          span.className = `removable-tag`;
          span.innerHTML = `${tag} <span onclick="this.parentElement.remove();tags.splice(tags.indexOf('${tag}'),1)">×</span>`;
          wrap.insertBefore(span, field);
        }
        field.value = '';
      }
    });
    el.querySelector('#saveGirlTags')?._tags || (el._tags = tags);
    el.id = 'modalOverlay';
    el._girlTags = tags;
  });
}

async function callGroq(messages, max_tokens=400) {
  const res = await fetch(GROQ_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_KEY}` },
    body: JSON.stringify({
      model: 'llama-3.1-8b-instant',
      max_tokens,
      temperature: 0.85,
      messages
    })
  });
  const d = await res.json();
  return d.choices?.[0]?.message?.content || '';
}

async function runDatePhase(context, phase) {
  const {act, girl} = context;
  const sys = `Eres el narrador de un juego romántico visual novel en español. Tu trabajo es crear escenas cortas e inmersivas de citas entre el jugador y ${girl.name}.
Personalidad de ${girl.name}: ${girl.tags.join(', ')}. Descripción: ${girl.desc}.
Actividad: ${act.name}. ${act.desc}.
Fase ${phase} de 3.
Escribe 3-4 frases de narrativa atmosférica de la cita. Incluye diálogo de ${girl.name} que refleje SU personalidad única. Luego escribe exactamente 3 opciones de respuesta del jugador en JSON al final con este formato exacto:
CHOICES:{"a":"texto opción A","b":"texto opción B","c":"texto opción C","effect":{"a":8,"b":-5,"c":2}}
Las opciones deben ser relevantes a su personalidad. effect es el cambio de enamoramiento para cada opción (puede ser negativo).`;

  const userMsg = phase === 1
    ? `Empieza la escena de ${act.name} con ${girl.name}.`
    : `Continúa la escena, fase ${phase}. El jugador eligió antes: "${context.lastChoice}". Enamoramiento actual: ${girl.love}%.`;

  const sceneEl = document.getElementById('sceneText');
  const choicesEl = document.getElementById('sceneChoices');
  if (!sceneEl) return;

  sceneEl.innerHTML = `<div class="scene-loading"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div> ${girl.name} está aquí contigo...</div>`;

  try {
    const reply = await callGroq([
      {role:'system', content:sys},
      {role:'user', content:userMsg}
    ]);

    const splitIdx = reply.indexOf('CHOICES:');
    const narrative = splitIdx > -1 ? reply.substring(0, splitIdx).trim() : reply.trim();
    let choices = null;
    if (splitIdx > -1) {
      try { choices = JSON.parse(reply.substring(splitIdx + 8)); } catch(e) {}
    }

    sceneEl.innerHTML = narrative.replace(/\n/g, '<br>');
    choicesEl.innerHTML = '';

    if (choices && phase < 3) {
      const list = document.createElement('div');
      list.className = 'choice-list';
      list.style.marginTop = '14px';
      ['a','b','c'].forEach(k => {
        if (!choices[k]) return;
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = choices[k];
        btn.onclick = async () => {
          const eff = choices.effect?.[k] || 0;
          context.loveChange += eff;
          context.lastChoice = choices[k];
          // Apply partial effect
          girl.love = Math.max(0, Math.min(100, girl.love + eff));
          save();
          choicesEl.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
          if (eff > 0) toast(`+${eff} amor 💜`, 'success', '🌸');
          else if (eff < 0) toast(`${eff} amor 💔`, 'error', '⚠');
          else toast('Momento especial ✨', 'info', '✨');
          await runDatePhase(context, phase + 1);
        };
        list.appendChild(btn);
      });
      choicesEl.appendChild(list);
    } else if (phase >= 3) {
      // Final phase - show summary after short delay
      setTimeout(() => showDateSummary(context), 500);
    }
  } catch(e) {
    sceneEl.innerHTML = `<em style="color:var(--text2)">Error generando escena. Comprueba tu conexión.</em>`;
    console.error(e);
  }
}

function showDateSummary(context) {
  const {act, girl, loveChange} = context;
  const summaryEl = document.getElementById('sceneSummary');
  const rowsEl = document.getElementById('summaryRows');

  if (!summaryEl || !rowsEl) return;

  girl.datesCount = (girl.datesCount || 0) + 1;
  girl.status = getStatus(girl.love);
  save();

  if (choicesEl) choicesEl.innerHTML = '';

  const feel = loveChange > 10 ? 'Fue una cita perfecta 💜' : loveChange > 0 ? 'Fue un buen momento 🌸' : loveChange < -5 ? 'No fue como esperaba... 💔' : 'Estuvo bien, aunque con tensión';

  rowsEl.innerHTML = `

    <div class="summary-row"><span>Cómo se sintió</span><em style="color:var(--text2)">${feel}</em></div>

  `;

  summaryEl.style.display = 'block';
}

async function sendChat() {
  if (state.points < 5) { toast('Necesitas 5 PI para enviar un mensaje', 'error', '⚠'); return; }

  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;

  const g = state.girls.find(x => x.id === currentChatGirl);
  if (!g) return;

  state.points -= 5;
  save();
  updateHeader();

  const now = new Date().toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit'});
  g.chatHistory.push({ role: 'user', text: msg, time: now });

  input.value = '';
  input.disabled = true;
  document.getElementById('chatSendBtn').disabled = true;

  // Show typing
  const msgs = document.getElementById('chatMessages');
  const typingDiv = document.createElement('div');
  typingDiv.className = 'msg her';
  typingDiv.id = 'typingIndicator';
  typingDiv.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  msgs.appendChild(typingDiv);
  msgs.scrollTop = msgs.scrollHeight;

  const history = g.chatHistory.slice(-10);
  const sys = `Eres ${g.name}, una chica con la siguiente personalidad: ${g.tags.join(', ')}. ${g.desc}
Estás chateando con alguien que te importa. Tu nivel de enamoramiento actual es ${g.love}%. 
Responde de forma natural y coherente con tu personalidad. Respuestas cortas (1-3 frases). En español. No repitas lo que te dicen, responde de forma genuina y con tu propio estilo.`;

  const messages = [
    {role:'system', content:sys},
    ...history.map(m => ({role: m.role === 'user' ? 'user' : 'assistant', content: m.text}))
  ];

  try {
    const reply = await callGroq(messages, 200);

    typingDiv.remove();

    const replyTime = new Date().toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit'});
    g.chatHistory.push({ role: 'her', text: reply, time: replyTime });

    // Analyze sentiment to affect love
    const sentiment = analyzeSentiment(msg, reply, g);
    g.love = Math.max(0, Math.min(100, g.love + sentiment));
    g.status = getStatus(g.love);
    save();

    renderChat(document.getElementById('content'));
  } catch(e) {
    typingDiv.remove();
    input.disabled = false;
    document.getElementById('chatSendBtn').disabled = false;
    toast('Error en el chat', 'error', '⚠');
  }
}

function analyzeSentiment(userMsg, reply, g) {
  // Simple heuristic: if reply contains positive words, love goes up
  const positive = /amor|bonito|feliz|genial|sí|encanta|quiero|especial|gracias|bien|perfecto/i.test(reply);
  const negative = /no|mal|molesta|cansada|déjame|basta|enfad/i.test(reply);
  if (positive) return 1;
  if (negative) return -2;
  return 0;
}

  currentChatGirl = girlId;
  showSection('chat');
  const chatNotif = document.getElementById('chatNotif');
  if (chatNotif) chatNotif.style.display = 'none';
}

// Daily streak decay - if not completed tasks, reduce love slightly
(function checkDailyDecay() {
  const today = new Date().toDateString();
  if (state.lastTaskDate && state.lastTaskDate !== today) {
    const last = new Date(state.lastTaskDate);
    const daysDiff = Math.floor((new Date() - last) / 86400000);
    if (daysDiff > 1) {
      // Streak broken
      if (state.streak > 0) {
        state.streak = 0;
        state.girls.forEach(g => {
          g.love = Math.max(0, g.love - 5);
          g.status = getStatus(g.love);
        });
        save();
        setTimeout(() => toast('Racha rota 💔 Las chicas lo notan...', 'error', '⚠'), 1000);
      }
    }
  }
