<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Dates</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0b14;
  --surface: #13101e;
  --surface2: #1a1628;
  --surface3: #221e35;
  --border: #2e2848;
  --accent: #c084fc;
  --accent2: #f472b6;
  --accent3: #67e8f9;
  --gold: #fbbf24;
  --green: #4ade80;
  --red: #f87171;
  --text: #e2d9f3;
  --text2: #9d8fc0;
  --text3: #6b5f8a;
  --radius: 14px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Starfield */
#stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation: twinkle var(--d, 3s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
  opacity: 0;
}
@keyframes twinkle {
  0%, 100% { opacity: 0; transform: scale(0.8); }
  50% { opacity: var(--op, 0.7); transform: scale(1); }
}

/* Layout */
#app {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Header */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  background: rgba(13,11,20,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-style: italic;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 0.5px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.streak-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(251,191,36,0.12);
  border: 1px solid rgba(251,191,36,0.3);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 13px;
  color: var(--gold);
  font-weight: 500;
}

.points-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(192,132,252,0.12);
  border: 1px solid rgba(192,132,252,0.3);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 13px;
  color: var(--accent);
  font-weight: 600;
}

/* Nav */
nav {
  display: flex;
  gap: 4px;
  padding: 10px 24px;
  background: rgba(13,11,20,0.6);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}

nav::-webkit-scrollbar { display: none; }

.nav-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-family: 'Outfit', sans-serif;
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  position: relative;
}

.nav-btn .notif {
  position: absolute;
  top: 4px; right: 8px;
  width: 7px; height: 7px;
  background: var(--accent2);
  border-radius: 50%;
  border: 1.5px solid var(--bg);
}

.nav-btn:hover { color: var(--text); background: var(--surface2); }

.nav-btn.active {
  color: var(--accent);
  background: rgba(192,132,252,0.1);
}

/* Content */
#content {
  flex: 1;
  padding: 24px;
  max-width: 1100px;
  margin: 0 auto;
  width: 100%;
}

/* Section titles */
.section-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 20px;
}

/* Cards grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 16px;
}

/* Girl card */
.girl-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
}

.girl-card:hover {
  border-color: var(--accent);
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(192,132,252,0.15);
}

.girl-card .girl-img {
  width: 100%;
  aspect-ratio: 3/4;
  object-fit: cover;
  display: block;
}

.girl-card .girl-img-placeholder {
  width: 100%;
  aspect-ratio: 3/4;
  background: linear-gradient(135deg, var(--surface2), var(--surface3));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
}

.girl-card .girl-info {
  padding: 12px;
}

.girl-card .girl-name {
  font-weight: 600;
  font-size: 15px;
  margin-bottom: 4px;
}

.girl-card .girl-desc {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 10px;
  line-height: 1.4;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 10px;
}

.tag {
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  border: 1px solid;
}

.tag-purple { color: var(--accent); border-color: rgba(192,132,252,0.3); background: rgba(192,132,252,0.1); }
.tag-pink { color: var(--accent2); border-color: rgba(244,114,182,0.3); background: rgba(244,114,182,0.1); }
.tag-cyan { color: var(--accent3); border-color: rgba(103,232,249,0.3); background: rgba(103,232,249,0.1); }
.tag-gold { color: var(--gold); border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.1); }

.love-bar-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text2);
}

.love-bar {
  flex: 1;
  height: 4px;
  background: var(--surface3);
  border-radius: 2px;
  overflow: hidden;
}

.love-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 2px;
  transition: width 0.5s ease;
}

.girl-card .status-badge {
  position: absolute;
  top: 10px; right: 10px;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.badge-unknown { background: rgba(107,95,138,0.7); color: #c4b8e0; }
.badge-warming { background: rgba(244,114,182,0.2); border: 1px solid rgba(244,114,182,0.4); color: var(--accent2); }
.badge-hot { background: rgba(192,132,252,0.2); border: 1px solid rgba(192,132,252,0.4); color: var(--accent); }
.badge-cold { background: rgba(103,232,249,0.1); border: 1px solid rgba(103,232,249,0.3); color: var(--accent3); }
.badge-max { background: rgba(251,191,36,0.2); border: 1px solid rgba(251,191,36,0.4); color: var(--gold); }

/* Add card */
.add-card {
  background: transparent;
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 260px;
  color: var(--text3);
  font-size: 13px;
}

.add-card:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(192,132,252,0.05);
}

.add-card .plus {
  font-size: 28px;
  line-height: 1;
}

/* Tasks */
.tasks-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.btn {
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  border: none;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
}

.btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }

.btn-ghost {
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border);
}

.btn-ghost:hover { color: var(--text); border-color: var(--accent); }

.btn-sm {
  padding: 5px 12px;
  font-size: 12px;
  border-radius: 6px;
}

.btn-danger {
  background: rgba(248,113,113,0.15);
  color: var(--red);
  border: 1px solid rgba(248,113,113,0.3);
}

.btn-danger:hover { background: rgba(248,113,113,0.25); }

.btn-success {
  background: rgba(74,222,128,0.15);
  color: var(--green);
  border: 1px solid rgba(74,222,128,0.3);
}

.btn-success:hover { background: rgba(74,222,128,0.25); }

/* Task card */
.task-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 10px;
  transition: all 0.2s;
}

.task-card:hover { border-color: var(--surface3); }

.task-card.completed {
  opacity: 0.55;
  border-color: rgba(74,222,128,0.2);
}

.task-card.overdue {
  border-color: rgba(248,113,113,0.3);
  background: rgba(248,113,113,0.04);
}

.task-check {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid var(--border);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}

.task-check:hover { border-color: var(--green); }
.task-check.done { background: var(--green); border-color: var(--green); }

.task-info { flex: 1; min-width: 0; }

.task-name {
  font-weight: 500;
  font-size: 14px;
  margin-bottom: 3px;
}

.task-card.completed .task-name {
  text-decoration: line-through;
}

.task-meta {
  display: flex;
  gap: 10px;
  font-size: 12px;
  color: var(--text3);
  flex-wrap: wrap;
}

.task-deadline {
  color: var(--text2);
}

.task-deadline.soon { color: var(--gold); }
.task-deadline.overdue { color: var(--red); }

.task-points {
  display: flex;
  align-items: center;
  gap: 4px;
  font-weight: 700;
  font-size: 14px;
  color: var(--accent);
}

.cat-badge {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  background: var(--surface3);
  color: var(--text2);
}

/* Dates section */
.dates-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}

.activity-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}

.activity-card::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.3s;
}

.activity-card:hover { transform: translateY(-3px); }
.activity-card:hover::before { opacity: 1; }

.activity-card.cafe::before { background: linear-gradient(135deg, rgba(251,191,36,0.06), transparent); }
.activity-card.dinner::before { background: linear-gradient(135deg, rgba(244,114,182,0.08), transparent); }
.activity-card.walk::before { background: linear-gradient(135deg, rgba(74,222,128,0.06), transparent); }
.activity-card.movie::before { background: linear-gradient(135deg, rgba(103,232,249,0.06), transparent); }
.activity-card.trip::before { background: linear-gradient(135deg, rgba(192,132,252,0.1), transparent); }
.activity-card.concert::before { background: linear-gradient(135deg, rgba(251,191,36,0.08), transparent); }

.activity-card:hover { border-color: var(--accent); }

.activity-icon { font-size: 30px; margin-bottom: 12px; }

.activity-name {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 6px;
}

.activity-desc {
  font-size: 12.5px;
  color: var(--text2);
  margin-bottom: 12px;
  line-height: 1.5;
}

.activity-cost {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.cost-tag {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  background: rgba(192,132,252,0.1);
  padding: 4px 10px;
  border-radius: 6px;
}

.difficulty-dots {
  display: flex;
  gap: 3px;
}

.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--surface3);
}

.dot.active { background: var(--accent2); }

/* Modals */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 28px;
  width: 100%;
  max-width: 480px;
  max-height: 85vh;
  overflow-y: auto;
  animation: slideUp 0.25s ease;
  position: relative;
}

.modal.wide { max-width: 600px; }

@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  margin-bottom: 6px;
}

.modal-sub {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 24px;
}

.close-btn {
  position: absolute;
  top: 18px; right: 18px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  width: 32px; height: 32px;
  cursor: pointer;
  color: var(--text2);
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}

.close-btn:hover { color: var(--text); border-color: var(--accent); }

/* Form */
.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 6px;
}

.form-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.form-input:focus { border-color: var(--accent); }

.form-input::placeholder { color: var(--text3); }

textarea.form-input { resize: vertical; min-height: 80px; }

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.points-slider-wrap {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
}

.points-slider-top {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 13px;
  color: var(--text2);
}

.points-val {
  font-weight: 700;
  font-size: 18px;
  color: var(--accent);
}

input[type=range] {
  width: 100%;
  accent-color: var(--accent);
  cursor: pointer;
}

.tag-input-wrap {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px;
  min-height: 44px;
  align-items: center;
  cursor: text;
}

.tag-input-field {
  background: none;
  border: none;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  outline: none;
  flex: 1;
  min-width: 80px;
}

.removable-tag {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  background: rgba(192,132,252,0.15);
  color: var(--accent);
  border: 1px solid rgba(192,132,252,0.3);
}

.removable-tag span { cursor: pointer; font-size: 13px; line-height: 1; }

/* Chat */
.chat-wrap {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  height: 360px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg {
  display: flex;
  gap: 8px;
  max-width: 85%;
}

.msg.user { align-self: flex-end; flex-direction: row-reverse; }

.msg-bubble {
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 13.5px;
  line-height: 1.5;
}

.msg.her .msg-bubble {
  background: var(--surface3);
  color: var(--text);
  border-bottom-left-radius: 4px;
}

.msg.user .msg-bubble {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  border-bottom-right-radius: 4px;
}

.msg-time {
  font-size: 10px;
  color: var(--text3);
  align-self: flex-end;
  white-space: nowrap;
}

.chat-input-bar {
  display: flex;
  gap: 8px;
  padding: 12px;
  border-top: 1px solid var(--border);
}

.chat-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 8px 16px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}

.chat-input:focus { border-color: var(--accent); }

.chat-send {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
  flex-shrink: 0;
}

.chat-send:hover { opacity: 0.85; transform: scale(1.05); }
.chat-send:disabled { opacity: 0.4; cursor: not-allowed; }

.typing-indicator {
  display: flex;
  gap: 4px;
  align-items: center;
  padding: 10px 14px;
  background: var(--surface3);
  border-radius: 14px;
  border-bottom-left-radius: 4px;
  width: fit-content;
}

.typing-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--text3);
  animation: bounce 1.2s ease-in-out infinite;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
  40% { transform: translateY(-6px); opacity: 1; }
}

/* Notifications */
.notif-bar {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 24px;
}

.notif-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.2s;
  animation: slideRight 0.3s ease;
}

@keyframes slideRight { from { transform: translateX(-10px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.notif-item:hover { border-color: var(--accent); }
.notif-item.birthday { border-color: rgba(251,191,36,0.4); background: rgba(251,191,36,0.04); }
.notif-item.invite { border-color: rgba(244,114,182,0.3); background: rgba(244,114,182,0.04); }

.notif-icon { font-size: 22px; flex-shrink: 0; }

.notif-text { flex: 1; }
.notif-title { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
.notif-desc { font-size: 12px; color: var(--text2); }
.notif-dismiss { color: var(--text3); font-size: 18px; cursor: pointer; padding: 4px; }
.notif-dismiss:hover { color: var(--text); }

/* Date scene */
.scene-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  min-height: 120px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
}

.scene-loading {

function renderTaskCard(t) {
  const now = new Date();
  const deadline = t.deadline ? new Date(t.deadline) : null;
  let deadlineClass = '';

  const deadline = t.deadline ? new Date(t.deadline) : null;

  // Time penalty
  if (deadline && now > deadline) {
    const overMin = (now - deadline) / 60000;
    const factor = overMin > 1440 ? 0 : 0.5;
    earned = Math.floor(earned * factor);

        <button class="btn btn-primary" onclick="saveTask()">Guardar</button>
      </div>
    </div>
  `);
}

function updateTaskPreview() {
  const p = document.getElementById('tPriority')?.value || 'media';
  const d = parseInt(document.getElementById('tDiff')?.value || 2);
  const [min, max] = PRIORITY_POINTS[p];
  const mult = [1, 1.5, 2][d - 1];
  document.getElementById('previewPi').textContent = `${Math.floor(min*mult)}–${Math.floor(max*mult)}`;
  document.getElementById('previewCoins').textContent = `🪙${PRIORITY_COINS[p] * (d === 3 ? 2 : d)}`;
}

function saveTask() {
  const name = document.getElementById('tName').value.trim();
  if (!name) { toast('Escribe un nombre', 'error', '⚠'); return; }
  const priority = document.getElementById('tPriority').value;
  const diff = parseInt(document.getElementById('tDiff').value);
  const [min, max] = PRIORITY_POINTS[priority];
  const mult = [1, 1.5, 2][diff - 1];
  const points = Math.floor((min + Math.random() * (max - min)) * mult);
  const coins = PRIORITY_COINS[priority] * diff;

  state.tasks.unshift({
    id: 't' + (state.nextTaskId++),
    name,
    category: document.getElementById('tCat').value,
    priority,
    deadline: document.getElementById('tDeadline').value || null,
    points,
    coins,
    completed: false,
    createdAt: new Date().toISOString(),
  });
  save();
  closeOverlay();
  toast(`Tarea creada — ✦${points} PI y 🪙${coins} en juego`, 'success', '📋');
  showSection('tareas');
}

function handleNotif(id) {
  const n = state.notifications.find(x => x.id == id);
  if (!n) return;
  if (n.type === 'invite' || n.type === 'message' || n.type === 'mood') {
    dismissNotif(null, id);
    currentChatGirl = n.girl;
    showSection('chat');
  } else if (n.type === 'birthday') {
    dismissNotif(null, id);
    openBirthdayModal(n.girl);
  } else {
    dismissNotif(null, id);
    showSection('tareas');
  }
}

function openBirthdayModal(girlId) {
  const g = state.girls.find(x => x.id === girlId);
  if (!g) return;
  openOverlay(`
    <div class="modal" style="text-align:center">
      <div style="font-size:48px;margin-bottom:12px">🎂</div>
      <div class="modal-title">¡Feliz cumpleaños, ${g.name}!</div>

function dismissNotif(e, id) {
  if (e) e.stopPropagation();
  state.notifications = state.notifications.filter(n => n.id != id);

function doGift(girlId, cost, label) {

  const g = state.girls.find(x => x.id === girlId);

function buyItem(id) {
  const item = SHOP_ITEMS.find(x => x.id === id);
  if (!item) return;
  if (state.coins < item.cost) { toast('No tienes suficientes monedas 🪙', 'error', '⚠'); return; }

  // If it's a gift or buff, ask who to use on
  if (['gift_love', 'buff_date', 'free_date'].includes(item.type)) {
    if (state.girls.length === 0) { toast('No tienes chicas todavía', 'error', '⚠'); return; }
    const girlOpts = state.girls.map(g => `<option value="${g.id}">${g.emoji} ${g.name}</option>`).join('');
    openOverlay(`
      <div class="modal">
        <button class="close-btn" onclick="closeOverlay()">×</button>
        <div class="modal-title">${item.icon} ${item.name}</div>
        <div class="modal-sub">${item.desc}</div>

    `);

    useItem(id, null);
  }
}

function useItem(id, girlId) {
  const item = SHOP_ITEMS.find(x => x.id === id);
  if (!item) return;
  if (state.coins < item.cost) { toast('No tienes suficientes monedas', 'error', '⚠'); return; }
  state.coins -= item.cost;

  if (item.type === 'gift_love' && girlId) {
    const g = state.girls.find(x => x.id === girlId);
    if (g) {
      g.love = Math.min(100, g.love + item.bonus);
      g.status = getStatus(g.love);
      if (item.id === 'joya' && g.rival) { g.rival = false; toast('¡El rival se retiró! 💪', 'success', '⭐'); }
      toast(`${item.icon} Regalado a ${g.name} — +${item.bonus} amor`, 'success', '💜');
    }
  } else if (item.type === 'aspiration') {
    state.aspiration = Math.min(100, (state.aspiration || 50) + item.bonus);
    toast(`${item.icon} +${item.bonus} aspiración`, 'success', '⭐');
  } else if (item.type === 'chat_free') {
    state.freeChatMessages = (state.freeChatMessages || 0) + item.bonus;
    toast(`${item.icon} Próximos ${item.bonus} mensajes gratis`, 'success', '💬');
  } else if (item.type === 'buff_date' && girlId) {
    state.dateBuff = { girlId, bonus: item.bonus };
    toast(`${item.icon} Buff activo para la próxima cita con ${state.girls.find(x=>x.id===girlId)?.name}`, 'success', '✨');
  } else if (item.type === 'free_date' && girlId) {
    state.inventory = state.inventory || [];
    state.inventory.push({ id, girlId, label: `${item.icon} ${item.name}` });
    toast(`${item.icon} Guardado en tu inventario`, 'success', '🎒');
    closeOverlay();
    save();
    updateHeader();
    showSection('tienda');
    return;
  }

  save();
  updateHeader();
  closeOverlay();
  showSection('tienda');
}

  openOverlay(`

    loveChange: 0,
    phase: 0, // 0=opening, 1..N=conversation, final=summary

    maxExchanges: act.depth === 1 ? 4 : act.depth === 2 ? 6 : 8,
  };

  openOverlay(`

async function initDateConversation(ctx) {
  const {act, girl} = ctx;
  const sys = buildDateSystem(ctx);

  appendDateMsg('her', null, true); // typing
  try {
    const reply = await callGroq([
      {role:'system', content: sys},
      {role:'user', content: `Empieza la escena de ${act.name} en ${act.location}. Describe brevemente el ambiente y di algo como ${girl.name} para abrir la conversación.`}
    ], 300);
    removeTyping();
    appendDateMsg('her', reply);
    ctx.messages.push({role:'assistant', content: reply});
    ctx.phase++;
    updateDateProgress(ctx);
  } catch(e) {
    removeTyping();
    appendDateMsg('system', 'Error al conectar. Inténtalo de nuevo.');
  }
}

function buildDateSystem(ctx) {
  const {act, girl} = ctx;
  return `Eres ${girl.name} en una cita romántica (${act.name}) en ${act.location}.
Tu personalidad: ${girl.tags.join(', ')}. ${girl.desc}
Tu nivel de enamoramiento: ${girl.love}%. ${girl.love < 30 ? 'Estás un poco fría, reservada.' : girl.love > 70 ? 'Estás muy enamorada, emocionada.' : 'Estás cómoda pero con ligera reserva.'}
${ctx.buffBonus > 0 ? 'Hoy te sientes especialmente bien y eres más receptiva.' : ''}
REGLAS:
- Responde como ${girl.name} de forma natural, máx 3 frases.
- Muestra tu personalidad real: si eres sarcástica, usa ironía sutil. Si eres tímida, duda un poco.
- No des opciones de respuesta. Solo habla como ella.
- En español. Nada de asteriscos ni acciones entre corchetes.
- Evalúa internamente si la respuesta del jugador fue buena, neutral o mala para ti según tu personalidad.
Al final de cada respuesta tuya, añade una línea oculta en este formato exacto:
[EVAL:+8] para buena, [EVAL:0] para neutral, [EVAL:-6] para mala. Ajusta el número entre -15 y +15.`;
}

async function sendDateMessage() {
  const input = document.getElementById('dateInput');
  if (!input) return;
  const msg = input.value.trim();
  if (!msg) return;

  // Get dateCtx from closure — stored on the modal element
  const modal = document.getElementById('dateModal');
  if (!modal || !modal._ctx) return;
  const ctx = modal._ctx;

  input.value = '';
  input.disabled = true;
  document.getElementById('dateSendBtn').disabled = true;

  appendDateMsg('user', msg);
  ctx.messages.push({role:'user', content: msg});

  appendDateMsg('her', null, true);
  try {
    const messages = [
      {role:'system', content: buildDateSystem(ctx)},
      ...ctx.messages
    ];
    const reply = await callGroq(messages, 280);
    removeTyping();

    // Parse eval
    const evalMatch = reply.match(/\[EVAL:([+-]?\d+)\]/);
    const evalVal = evalMatch ? parseInt(evalMatch[1]) : 0;
    const cleanReply = reply.replace(/\[EVAL:[+-]?\d+\]/g, '').trim();

    // Apply buff
    const finalEval = evalVal + (ctx.buffBonus > 0 ? Math.ceil(ctx.buffBonus * 0.3) : 0);
    ctx.loveChange += finalEval;
    ctx.girl.love = Math.max(0, Math.min(100, ctx.girl.love + finalEval));

    if (evalVal > 5) toast(`💜 Le gustó tu respuesta`, 'success', '🌸');
    else if (evalVal < -4) toast(`💔 No le gustó mucho`, 'error', '⚠');

    appendDateMsg('her', cleanReply);
    ctx.messages.push({role:'assistant', content: cleanReply});
    ctx.phase++;
    updateDateProgress(ctx);

    // Update love indicator
    const li = document.getElementById('dateLoveIndicator');
    if (li) li.textContent = `❤️ ${ctx.girl.love}%`;

    save();

    // Check if date should end
    if (ctx.phase >= ctx.maxExchanges) {
      setTimeout(() => endDate(ctx), 600);
    } else {
      input.disabled = false;
      document.getElementById('dateSendBtn').disabled = false;
      input.focus();
    }
  } catch(e) {
    removeTyping();
    input.disabled = false;
    document.getElementById('dateSendBtn').disabled = false;
    toast('Error de conexión', 'error', '⚠');
  }
}

function appendDateMsg(role, text, typing = false) {
  const msgs = document.getElementById('dateChatMessages');
  if (!msgs) return;
  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : role === 'her' ? 'her' : ''}`;
  if (typing) {
    div.id = 'dateTyping';
    div.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  } else if (role === 'system') {
    div.style.cssText = 'text-align:center;color:var(--text3);font-size:12px;width:100%';
    div.textContent = text;
  } else {
    div.innerHTML = `<div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>`;
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('dateTyping');
  if (el) el.remove();
}

function updateDateProgress(ctx) {
  const el = document.getElementById('dateProgress');
  if (el) el.textContent = `${ctx.phase}/${ctx.maxExchanges} momentos`;
}

function endDate(ctx) {
  const {girl, loveChange, act} = ctx;
  girl.datesCount = (girl.datesCount || 0) + 1;
  girl.status = getStatus(girl.love);
  state.aspiration = Math.min(100, (state.aspiration || 50) + 2);
  save();

  // Check bad end: rival takes over
  if (loveChange < -10) {

    girl.rival = true;
    girl.rivalDeadline = Date.now() + 72 * 60 * 60 * 1000;
  }

  const summaryEl = document.getElementById('dateSummary');
  const inputEl = document.getElementById('dateChatInput');
  if (inputEl) inputEl.style.display = 'none';

  const feel = loveChange > 12 ? '¡Fue una cita increíble! 💜' : loveChange > 4 ? 'Fue un buen momento 🌸' : loveChange < -8 ? 'No salió bien... Puede haber consecuencias.' : 'Estuvo bien, aunque con tensión.';

      <div class="summary-row"><span>Cambio amor</span><span class="love-change ${loveChange > 0 ? 'positive' : loveChange < 0 ? 'negative' : 'neutral'}">${loveChange > 0 ? '+' : ''}${loveChange}%</span></div>
      <div class="summary-row"><span>Amor total</span><span style="color:var(--accent);font-weight:700">${girl.love}%</span></div>
      ${loveChange < -10 ? `<div style="margin-top:8px;padding:10px;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:8px;font-size:12px;color:var(--red)">⚠ La cita fue mal. ${girl.name} está considerando salir con otra persona. ¡Actúa rápido!</div>` : ''}

Al final, incluye: [EVAL:+X] o [EVAL:-X] donde X es el impacto en el amor (entre -8 y +6).`;

    const evalVal = evalMatch ? parseInt(evalMatch[1]) : 0;
    const cleanReply = reply.replace(/\[EVAL:[+-]?\d+\]/g, '').trim();

    const replyTime = new Date().toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit'});
    g.chatHistory.push({ role: 'her', text: cleanReply, time: replyTime });

    g.love = Math.max(0, Math.min(100, g.love + evalVal));
    g.status = getStatus(g.love);

    // If she proposes a date back (detected by keywords in her reply)
    if (/quedamos|claro que sí|encantaría|apuntada|me parece bien|cuando quieras|de acuerdo|sí, claro|venga/i.test(cleanReply) && proposingDate) {
      g.scheduledDate = g.scheduledDate || { date: new Date(Date.now() + 2*86400000).toISOString().slice(0,16), place: 'Sorpresa' };
      toast(`${g.name} aceptó la cita 🎉 ¡Agéndala en Citas!`, 'success', '🌸');
    }

    save();
    renderChat(document.getElementById('content'));
  } catch(e) {
    typingDiv.remove();
    input.disabled = false;
    document.getElementById('chatSendBtn').disabled = false;
    toast('Error de conexión', 'error', '⚠');
  }
}

function openChatWith(girlId) {
  currentChatGirl = girlId;
  showSection('chat');
  const el = document.getElementById('chatNotif');
  if (el) el.style.display = 'none';
}

// ---- API ----
async function callGroq(messages, max_tokens=400) {
  const res = await fetch(GROQ_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${GROQ_KEY}`},
    body: JSON.stringify({ model:'llama-3.1-8b-instant', max_tokens, temperature:0.85, messages })
  });
  const d = await res.json();
  return d.choices?.[0]?.message?.content || '';
}

// ---- Init ----
updateHeader();
showSection('tareas');

// Attach ctx to date modal after render (patch runDateConversation)
const _origOpen = openOverlay;

// Override to inject ctx
async function runDateConversation(act, g, fromSchedule = false) {
  const hasBuff = state.dateBuff && state.dateBuff.girlId === g.id;
  const buffBonus = hasBuff ? state.dateBuff.bonus : 0;
  if (hasBuff) { state.dateBuff = null; save(); }
  const ctx = {
    act, girl: g, messages: [], loveChange: 0, phase: 0, buffBonus,
    maxExchanges: act.depth === 1 ? 4 : act.depth === 2 ? 6 : 8,
  };

  openOverlay(`
    <div class="modal wide" id="dateModal">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <span style="font-size:28px">${g.emoji}</span>
        <div>
          <div style="font-weight:700;font-size:16px">${act.icon} ${act.name} con ${g.name}</div>
          <div style="font-size:12px;color:var(--text2)">📍 ${act.location} ${hasBuff ? '· ✨ Buff activo' : ''}</div>
        </div>
        <div style="margin-left:auto">
          <div id="dateLoveIndicator" style="font-size:12px;color:var(--accent)">❤️ ${g.love}%</div>
          <div id="dateProgress" style="font-size:11px;color:var(--text3)">Inicio</div>
        </div>
      </div>
      <div id="dateChatMessages" class="chat-messages" style="height:300px;background:var(--surface2);border-radius:12px;border:1px solid var(--border);margin-bottom:12px;padding:14px"></div>
      <div id="dateChatInput" style="display:flex;gap:8px">
        <input class="chat-input" id="dateInput" placeholder="Respóndele..." onkeydown="if(event.key==='Enter')sendDateMessage()" style="flex:1">
        <button class="chat-send" id="dateSendBtn" onclick="sendDateMessage()">➤</button>
      </div>
      <div id="dateSummary" style="display:none"></div>
    </div>
  `);

  // Store ctx on modal
  const modal = document.getElementById('dateModal');
  if (modal) modal._ctx = ctx;

  await initDateConversation(ctx);
}

// Daily streak decay
(function checkDailyDecay() {
  if (state.lastTaskDate) {
    const last = new Date(state.lastTaskDate);
    const daysDiff = Math.floor((new Date() - last) / 86400000);
    if (daysDiff > 1 && state.streak > 0) {
      state.streak = 0;
      state.girls.forEach(g => { g.love = Math.max(0, g.love - 5); g.status = getStatus(g.love); });
      save();
      setTimeout(() => toast('Racha rota 💔 Las chicas lo notan...', 'error', '⚠'), 1500);
    }
  }
})();

setTimeout(checkAndFireEvent, 2000);
